<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Clip - Free Music Platform</title>
    <meta name="author" content="Https-Mango">
    <meta name="description" content="M-Clip is a free and open-source music platform that allows you to listen to music without any restrictions.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 50%, #1a2f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e8e8e8;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 3rem;
            position: relative;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 28px;
            margin: 0 auto;
            box-shadow: 
                0 20px 40px rgba(74, 222, 128, 0.3),
                0 0 60px rgba(74, 222, 128, 0.1);
            position: relative;
            overflow: hidden;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 28px;
            display: block;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 50%, #86efac 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4rem;
            letter-spacing: -2px;
            text-shadow: 0 0 80px rgba(74, 222, 128, 0.3);
        }

        .about-section {
            margin-bottom: 4rem;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #4ade80;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #a3a3a3;
            max-width: 600px;
            margin: 0 auto;
            font-weight: 400;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            color: #0d0d0d;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 30px rgba(74, 222, 128, 0.4),
                0 0 0 1px rgba(74, 222, 128, 0.2);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            transition: left 0.5s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 20px 40px rgba(74, 222, 128, 0.5),
                0 0 0 1px rgba(74, 222, 128, 0.3);
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:active {
            transform: translateY(-1px);
        }

        .cta-button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }

            h1 {
                font-size: 2.5rem;
                letter-spacing: -1px;
                margin-bottom: 2.5rem;
            }

            h2 {
                font-size: 1.25rem;
            }

            p {
                font-size: 0.95rem;
                line-height: 1.7;
            }

            .logo {
                width: 100px;
                height: 100px;
                border-radius: 20px;
            }

            .logo img {
                border-radius: 20px;
            }

            .cta-button {
                padding: 1rem 2rem;
                font-size: 1rem;
            }

            .about-section {
                margin-bottom: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .logo {
                width: 80px;
                height: 80px;
                border-radius: 16px;
            }

            .logo img {
                border-radius: 16px;
            }

            .cta-button {
                padding: 0.875rem 1.75rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo">
                <img src="15026.jpg" alt="M-Clip Logo">
            </div>
        </div>

        <h1>M-Clip</h1>

        <div class="about-section">
            <h2>M-Clip? What?</h2>
            <p>M-Clip is a music platform that allows you to listen to music completely free and without restrictions.</p>
        </div>

        <a href="player.html" class="cta-button">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 5v14l11-7z"/>
            </svg>
            Listen perfect works
        </a>
    </div>

    <script>
        function welcome() {
            const welcome = 'Hi! :3 | All developed by Https-Mango!';
            alert(welcome);
            console.log(welcome);
        }
        welcome()
    </script>

</body>
</html>
