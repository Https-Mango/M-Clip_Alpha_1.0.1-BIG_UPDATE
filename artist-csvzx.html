<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Csvzx - M-Clip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 50%, #1a2f1a 100%);
            min-height: 100vh;
            color: #e8e8e8;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(74, 222, 128, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(74, 222, 128, 0.2);
        }

        .nav-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav-title {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 50%, #86efac 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link {
            padding: 0.6rem 1.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #a3a3a3;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link:hover {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .nav-link.active {
            color: #0d0d0d;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }

        .main-content {
            padding-top: 70px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6rem 2rem 2rem;
        }

        .artist-header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .artist-avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, rgba(74, 222, 128, 0.15) 0%, rgba(34, 197, 94, 0.15) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(74, 222, 128, 0.3);
            box-shadow: 0 10px 40px rgba(74, 222, 128, 0.2);
        }

        .artist-avatar svg {
            width: 50px;
            height: 50px;
            fill: #4ade80;
        }

        .artist-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e8e8e8;
            margin-bottom: 0.5rem;
        }

        .artist-header p {
            font-size: 1.1rem;
            color: #888;
        }

        .tracks-section {
            width: 100%;
            max-width: 800px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #4ade80;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .track-search {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .track-search input {
            width: 100%;
            padding: 1rem 1.25rem;
            padding-left: 3rem;
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.8) 0%, rgba(13, 13, 13, 0.9) 100%);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 12px;
            color: #e8e8e8;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
        }

        .track-search input:focus {
            outline: none;
            border-color: rgba(74, 222, 128, 0.5);
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.1);
        }

        .track-search input::placeholder {
            color: #666;
        }

        .track-search svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: #666;
            transition: fill 0.3s ease;
        }

        .track-search input:focus + svg {
            fill: #4ade80;
        }

        .track-card.hidden {
            display: none;
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            color: #666;
            font-size: 1rem;
            display: none;
        }

        .no-results.visible {
            display: block;
        }

        .tracks-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .track-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.25rem 1.5rem;
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.8) 0%, rgba(13, 13, 13, 0.9) 100%);
            border: 1px solid rgba(74, 222, 128, 0.15);
            border-radius: 16px;
            text-decoration: none;
            color: #e8e8e8;
            transition: all 0.3s ease;
        }

        .track-card:hover {
            transform: translateX(8px);
            border-color: rgba(74, 222, 128, 0.4);
            box-shadow: 0 10px 30px rgba(74, 222, 128, 0.1);
        }

        .track-number {
            width: 40px;
            height: 40px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #4ade80;
            flex-shrink: 0;
        }

        .track-info {
            flex: 1;
        }

        .track-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .track-info p {
            font-size: 0.9rem;
            color: #888;
        }

        .track-play {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .track-card:hover .track-play {
            transform: scale(1.1);
        }

        .track-play svg {
            width: 20px;
            height: 20px;
            fill: #0d0d0d;
            margin-left: 2px;
        }

        .track-player {
            display: none;
            margin-top: 1.5rem;
            padding: 3rem;
            background: linear-gradient(145deg, rgba(26, 26, 26, 0.95) 0%, rgba(13, 13, 13, 0.98) 100%);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 24px;
            animation: slideDown 0.3s ease-out;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
        }

        .track-player.active {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-album-art {
            width: 320px;
            height: 320px;
            margin: 0 auto 2.5rem;
            background: linear-gradient(145deg, rgba(74, 222, 128, 0.1) 0%, rgba(34, 197, 94, 0.1) 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(74, 222, 128, 0.2);
            box-shadow: 0 25px 80px rgba(74, 222, 128, 0.15);
        }

        .player-album-art svg {
            width: 120px;
            height: 120px;
            fill: #4ade80;
            opacity: 0.6;
        }

        .player-track-info {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .player-track-info h3 {
            font-size: 2rem;
            font-weight: 700;
            color: #e8e8e8;
            margin-bottom: 0.75rem;
        }

        .player-track-info p {
            font-size: 1.2rem;
            color: #888;
        }

        .player-progress {
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(74, 222, 128, 0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
            border-radius: 5px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 1rem;
            color: #888;
        }

        .player-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            transform: scale(1.1);
        }

        .control-btn svg {
            fill: #a3a3a3;
            transition: fill 0.3s ease;
        }

        .control-btn:hover svg {
            fill: #4ade80;
        }

        .control-btn.loop svg {
            width: 32px;
            height: 32px;
        }

        .control-btn.play {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
            border-radius: 50%;
            box-shadow: 0 12px 35px rgba(74, 222, 128, 0.4);
        }

        .control-btn.play:hover {
            transform: scale(1.05);
            box-shadow: 0 18px 45px rgba(74, 222, 128, 0.5);
        }

        .control-btn.play svg {
            fill: #0d0d0d;
            width: 32px;
            height: 32px;
        }

        .control-btn.loop.active svg {
            fill: #4ade80;
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.4);
            transform: scale(1.1);
        }

        .close-btn svg {
            fill: #a3a3a3;
            transition: fill 0.3s ease;
        }

        .close-btn:hover svg {
            fill: #4ade80;
        }

        .track-player {
            position: relative;
        }

        .track-card.active {
            border-color: #4ade80;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
        }

        .track-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .add-to-playlist-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid rgba(74, 222, 128, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .add-to-playlist-btn:hover {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.5);
            transform: scale(1.1);
        }

        .add-to-playlist-btn svg {
            fill: #4ade80;
        }

        .add-to-playlist-btn.added {
            background: #4ade80;
            border-color: #4ade80;
        }

        .add-to-playlist-btn.added svg {
            fill: #0d0d0d;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 0 1rem;
                height: 60px;
            }

            .nav-logo {
                width: 36px;
                height: 36px;
            }

            .nav-title {
                font-size: 1.25rem;
            }

            .nav-link {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }

            .main-content {
                padding: 5rem 1rem 2rem;
            }

            .artist-header h1 {
                font-size: 2rem;
            }

            .artist-avatar {
                width: 100px;
                height: 100px;
            }

            .track-card {
                padding: 1rem;
            }

            .track-info h3 {
                font-size: 1rem;
            }

            .track-player {
                padding: 1.5rem;
                max-width: 100%;
                margin-left: 0;
                margin-right: 0;
            }

            .player-album-art {
                width: 200px;
                height: 200px;
            }

            .player-album-art svg {
                width: 70px;
                height: 70px;
            }

            .player-track-info h3 {
                font-size: 1.25rem;
            }

            .control-btn.play {
                width: 60px;
                height: 60px;
            }

            .control-btn.play svg {
                width: 24px;
                height: 24px;
            }

            .control-btn.loop svg {
                width: 24px;
                height: 24px;
            }

            .close-btn {
                width: 32px;
                height: 32px;
                top: 0.75rem;
                right: 0.75rem;
            }

            .close-btn svg {
                width: 16px;
                height: 16px;
            }

            .player-progress {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .player-album-art {
                width: 160px;
                height: 160px;
            }

            .player-album-art svg {
                width: 60px;
                height: 60px;
            }

            .player-track-info h3 {
                font-size: 1.1rem;
            }

            .player-track-info p {
                font-size: 0.95rem;
            }

            .track-player {
                padding: 1.25rem 1rem;
            }
        }

        @media (min-width: 1200px) {
            .track-player {
                max-width: 900px;
            }

            .player-album-art {
                width: 360px;
                height: 360px;
            }

            .player-album-art svg {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>

    <audio id="audio"></audio>

    <script>
        const trackPlayer = document.getElementById('trackPlayer');
        const playerPlayBtn = document.getElementById('playerPlayBtn');
        const playerPlayIcon = document.getElementById('playerPlayIcon');
        const playerPauseIcon = document.getElementById('playerPauseIcon');
        const loopBtn = document.getElementById('loopBtn');
        const closeBtn = document.getElementById('closeBtn');
        const audio = document.getElementById('audio');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const playerTrackName = document.getElementById('playerTrackName');

        let isPlaying = false;
        let isLooping = false;
        let currentTrackCard = null;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function loadTrack(card) {
            const trackSrc = card.dataset.track;
            const trackName = card.dataset.name;
            
            audio.src = trackSrc;
            playerTrackName.textContent = trackName;
            
            // Reset all cards
            document.querySelectorAll('.track-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            
            // Move player after the selected card
            card.after(trackPlayer);
            trackPlayer.style.display = 'block';
            trackPlayer.classList.add('active');
            
            currentTrackCard = card;
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playerPlayIcon.style.display = 'block';
                playerPauseIcon.style.display = 'none';
            } else {
                audio.play();
                playerPlayIcon.style.display = 'none';
                playerPauseIcon.style.display = 'block';
            }
            isPlaying = !isPlaying;
        }

        function stopPlayback() {
            audio.pause();
            isPlaying = false;
            playerPlayIcon.style.display = 'block';
            playerPauseIcon.style.display = 'none';
        }

        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        }

        function setProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if (duration) {
                audio.currentTime = (clickX / width) * duration;
            }
        }

        // Track card click handlers
        document.querySelectorAll('.track-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if (e.target.closest('.track-play')) {
                    // Play button clicked
                    e.stopPropagation();
                    if (currentTrackCard !== card || !trackPlayer.classList.contains('active')) {
                        loadTrack(card);
                    }
                    togglePlay();
                } else {
                    // Card clicked - just show player
                    if (currentTrackCard !== card) {
                        loadTrack(card);
                        stopPlayback();
                    } else {
                        trackPlayer.classList.toggle('active');
                    }
                }
            });
        });

        // Player controls
        playerPlayBtn.addEventListener('click', togglePlay);

        loopBtn.addEventListener('click', () => {
            isLooping = !isLooping;
            audio.loop = isLooping;
            loopBtn.classList.toggle('active', isLooping);
        });

        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            trackPlayer.classList.remove('active');
            trackPlayer.style.display = 'none';
            if (currentTrackCard) {
                currentTrackCard.classList.remove('active');
            }
            stopPlayback();
        });

        // Add to playlist functionality
        document.querySelectorAll('.add-to-playlist-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const trackFile = btn.dataset.track;
                const trackName = btn.dataset.name;
                
                // Get current playlist from localStorage (using slot 1 as default)
                let playlist = JSON.parse(localStorage.getItem('mclip_playlist_1') || '[]');
                
                // Check if track already exists
                const exists = playlist.some(t => t.file === trackFile);
                if (exists) {
                    alert(`"${trackName}" is already in the playlist!`);
                    return;
                }
                
                // Add track to playlist
                playlist.push({ file: trackFile, name: trackName });
                localStorage.setItem('mclip_playlist_1', JSON.stringify(playlist));
                
                // Visual feedback
                btn.classList.add('added');
                btn.title = 'Added to playlist';
                
                // Show confirmation
                alert(`"${trackName}" added to playlist!`);
            });
        });

        // Track search
        const trackSearch = document.getElementById('trackSearch');
        const noResults = document.getElementById('noResults');
        
        trackSearch.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase().trim();
            const trackCards = tracksList.querySelectorAll('.track-card');
            let visibleCount = 0;
            
            trackCards.forEach(card => {
                const trackName = card.querySelector('h3').textContent.toLowerCase();
                if (trackName.includes(searchTerm)) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });
            
            if (visibleCount === 0) {
                noResults.classList.add('visible');
            } else {
                noResults.classList.remove('visible');
            }
        });

        // Progress bar
        progressBar.addEventListener('click', setProgress);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });
        audio.addEventListener('ended', () => {
            if (!isLooping) {
                isPlaying = false;
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playerPlayIcon.style.display = 'block';
                playerPauseIcon.style.display = 'none';
            }
        });
    </script>
</body>
</html>
